services:
  postgres:
    image: postgres:16
    container_name: pedidos-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pedidos_db
    ports:
      - "5432:5432"
    volumes:
      - pedidos_postgres_data:/var/lib/postgresql/data

  estoque-postgres:
    image: postgres:16
    container_name: estoque-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: estoque_db
    ports:
      - "5433:5432"
    volumes:
      - estoque_postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: pedidos-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  pedidos_postgres_data:
  estoque_postgres_data:
